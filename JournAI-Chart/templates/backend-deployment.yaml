apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "journai.fullname" . }}-backend
  labels:
    {{- include "journai.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "journai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "journai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      # >>>Vault Annotations <<<
      annotations:
        # הפעלת ה-Vault Agent Sidecar Injection
        vault.hashicorp.com/agent-inject: "true"
        
        # 1. ה-Role משתנה לפי הסביבה (נדרס ע"י ArgoCD)
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        
        # 2. נתיב הסוד המשותף לכל הסביבות
        vault.hashicorp.com/agent-inject-template-secrets.env: |
          {% with secret_path = "{{ .Values.vault.secretPath }}" %}
          {% with secrets_data = secrets.kv.get (printf "%s/backend" secret_path) %}

          DB_PASSWORD={{ secrets_data.data.db_password }}
          JWT_SECRET={{ secrets_data.data.jwt_secret }}
          GEMINI_API_KEY={{ secrets_data.data.gemini_api_key }}
          OPENAI_API_KEY={{ secrets_data.data.openai_api_key }}
          AWS_ACCESS_KEY_ID={{ secrets_data.data.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY={{ secrets_data.data.aws_secret_access_key }}

          {% endwith %}
          {% endwith %}
      # >>> Vault Annotations <<<
    spec:
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        securityContext:
          runAsUser: 10001
          runAsGroup: 10001
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
        ports:
        - name: http
          containerPort: {{ .Values.backend.service.targetPort }}
          protocol: TCP
        env:
          # --- ConfigMap ---
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: PORT
        - name: DB_CLIENT
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: DB_CLIENT
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: DB_USER
        - name: S3_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: S3_BUCKET_NAME
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: AWS_REGION
        - name: DB_SSL
          valueFrom:
            configMapKeyRef:
              name: {{ include "journai.fullname" . }}-backend-config
              key: DB_SSL
        # --- ConfigMap ---

        {{- if and .Values.secrets.db.ssl.enabled .Values.secrets.db.ssl.caCertPath }}
        - name: DB_CA_CERT_PATH
          value: "/etc/ssl/certs/rds-ca-cert.pem"
        {{- end }}
        
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.service.targetPort }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.service.targetPort }}
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.backend.resources | nindent 12 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: data
          mountPath: /app/data
        {{- if and .Values.secrets.db.ssl.enabled .Values.secrets.db.ssl.caCertPath }}
        - name: db-ssl-certs
          mountPath: /etc/ssl/certs
          readOnly: true
        {{- else }}
        - name: ca-certs
          mountPath: /etc/ssl/certs
          readOnly: true
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: data
        emptyDir: {}
      {{- if and .Values.secrets.db.ssl.enabled .Values.secrets.db.ssl.caCertPath }}
      - name: db-ssl-certs
        secret:
          secretName: {{ include "journai.fullname" . }}-db-ssl-certs
          optional: false
      {{- else }}
      - name: ca-certs
        hostPath:
          path: /etc/ssl/certs
          type: Directory
      {{- end }}